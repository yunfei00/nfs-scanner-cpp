name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example v0.1.1'
        required: false
        default: 'manual-build'

permissions:
  contents: write

jobs:
  release:
    name: Build Release Packages
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release variables
        id: version
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if ($env:GITHUB_REF -like "refs/tags/*") {
            $releaseVersion = $env:GITHUB_REF_NAME
            Write-Host "Tag-triggered release detected: $releaseVersion"
          } else {
            $inputVersion = "${{ github.event.inputs.version }}"
            if ([string]::IsNullOrWhiteSpace($inputVersion)) {
              $inputVersion = "manual-build"
            }
            $releaseVersion = $inputVersion
            Write-Host "workflow_dispatch test build detected: $releaseVersion"
            Write-Host "This run will upload Actions artifacts only and will not create a formal GitHub Release."
          }

          if ($releaseVersion -eq "manual-build") {
            $appVersion = "0.0.0"
          } elseif ($releaseVersion.StartsWith("v")) {
            $appVersion = $releaseVersion.Substring(1)
          } else {
            $appVersion = $releaseVersion
          }

          $portableZip = "NFSScanner-Windows-Portable-$releaseVersion.zip"
          $setupExe = "NFSScanner-Setup-$releaseVersion.exe"

          Write-Host "RELEASE_VERSION=$releaseVersion"
          Write-Host "APP_VERSION=$appVersion"
          Write-Host "PORTABLE_ZIP=$portableZip"
          Write-Host "SETUP_EXE=$setupExe"

          "RELEASE_VERSION=$releaseVersion" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "APP_VERSION=$appVersion" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "PORTABLE_ZIP=$portableZip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "SETUP_EXE=$setupExe" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          "release_version=$releaseVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "app_version=$appVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "portable_zip=$portableZip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "setup_exe=$setupExe" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          cache: true
          setup-python: true

      - name: Setup MSVC x64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Print build environment
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host "Current directory:"
          Get-Location

          Write-Host "CMake version:"
          cmake --version

          Write-Host "Qt environment variables:"
          Get-ChildItem Env: |
            Where-Object { $_.Name -match '^(QT|Qt|QML|CMAKE_PREFIX_PATH)' } |
            Sort-Object Name |
            Format-Table -AutoSize

          Write-Host "PATH entries:"
          $env:PATH -split ';' | ForEach-Object { Write-Host $_ }

      - name: Configure CMake
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "Configuring CMake Release build with Visual Studio 17 2022 x64..."
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build Release
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "Building Release..."
          cmake --build build --config Release --parallel

      - name: Find NFSScanner.exe
        id: exe
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host "Searching for NFSScanner.exe under build..."
          $candidates = Get-ChildItem -Path build -Filter "NFSScanner.exe" -Recurse -File |
            Sort-Object FullName

          if (-not $candidates -or $candidates.Count -eq 0) {
            Write-Host "NFSScanner.exe was not found. Build directory tree:"
            Get-ChildItem -Path build -Recurse | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }

          Write-Host "Executable candidates:"
          $candidates | ForEach-Object { Write-Host $_.FullName }

          $selected = $candidates | Select-Object -First 1
          Write-Host "Selected executable: $($selected.FullName)"

          "exe_path=$($selected.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Create dist and artifacts directories
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $distDir = Join-Path "dist" "NFSScanner"
          New-Item -ItemType Directory -Force -Path $distDir | Out-Null
          New-Item -ItemType Directory -Force -Path "artifacts" | Out-Null

          $destination = Join-Path $distDir "NFSScanner.exe"
          Write-Host "Copying executable to $destination..."
          Copy-Item -LiteralPath "${{ steps.exe.outputs.exe_path }}" -Destination $destination -Force

      - name: Deploy Qt runtime
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          function Print-QtDiagnostics {
            Write-Host "Qt environment variables:"
            Get-ChildItem Env: |
              Where-Object { $_.Name -match '^(QT|Qt|QML|CMAKE_PREFIX_PATH)' } |
              Sort-Object Name |
              Format-Table -AutoSize

            Write-Host "PATH entries:"
            $env:PATH -split ';' | ForEach-Object { Write-Host $_ }
          }

          function Resolve-WinDeployQt {
            $pathCommand = Get-Command windeployqt -ErrorAction SilentlyContinue
            if ($pathCommand) {
              return $pathCommand.Source
            }

            $qtEnvNames = @("QT_ROOT_DIR", "Qt6_DIR", "Qt5_DIR", "QTDIR")
            foreach ($name in $qtEnvNames) {
              $value = [Environment]::GetEnvironmentVariable($name)
              if (-not $value) {
                continue
              }

              $candidateRoots = @($value)
              if ($name -in @("Qt6_DIR", "Qt5_DIR")) {
                $candidateRoots += (Split-Path (Split-Path (Split-Path $value -Parent) -Parent) -Parent)
              }

              foreach ($root in $candidateRoots) {
                $candidate = Join-Path $root "bin/windeployqt.exe"
                if (Test-Path $candidate) {
                  return (Resolve-Path $candidate).Path
                }
              }
            }

            return $null
          }

          $exePath = Join-Path "dist/NFSScanner" "NFSScanner.exe"
          if (-not (Test-Path $exePath)) {
            throw "Executable not found before windeployqt: $exePath"
          }

          Write-Host "Resolving windeployqt..."
          $winDeploy = Resolve-WinDeployQt
          if (-not $winDeploy) {
            Write-Host "windeployqt was not found."
            Print-QtDiagnostics
            exit 1
          }

          Write-Host "windeployqt path: $winDeploy"
          Write-Host "Deploying Qt runtime into dist/NFSScanner..."
          & $winDeploy $exePath --release --compiler-runtime

      - name: Copy project assets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $distDir = Join-Path "dist" "NFSScanner"
          $assetDirs = @("resources", "docs")
          $assetFiles = @("README.md", "LICENSE", "CHANGELOG.md")

          foreach ($dir in $assetDirs) {
            if (Test-Path $dir) {
              $destination = Join-Path $distDir $dir
              Write-Host "Copying directory $dir to $destination..."
              Copy-Item -Path $dir -Destination $destination -Recurse -Force
            } else {
              Write-Host "Skipping missing directory: $dir"
            }
          }

          foreach ($file in $assetFiles) {
            if (Test-Path $file) {
              $destination = Join-Path $distDir $file
              Write-Host "Copying file $file to $destination..."
              Copy-Item -Path $file -Destination $destination -Force
            } else {
              Write-Host "Skipping missing file: $file"
            }
          }

          Write-Host "dist/NFSScanner directory contents:"
          Get-ChildItem -Path $distDir -Recurse | ForEach-Object { Write-Host $_.FullName }

      - name: Create portable zip
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $zipPath = Join-Path "artifacts" $env:PORTABLE_ZIP
          if (Test-Path $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }

          Write-Host "Creating portable zip: $zipPath"
          Compress-Archive -Path "dist/NFSScanner" -DestinationPath $zipPath -CompressionLevel Optimal

          if (-not (Test-Path $zipPath)) {
            throw "Portable zip was not created: $zipPath"
          }

          Get-Item $zipPath | Format-List FullName,Length,LastWriteTime

      - name: Install Inno Setup
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host "Installing Inno Setup with Chocolatey..."
          choco install innosetup --yes

          $candidates = @(
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe"
          )

          $iscc = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) {
            Write-Host "ISCC.exe was not found after Chocolatey install."
            Write-Host "Inspecting C:\Program Files (x86)\Inno Setup 6:"
            Get-ChildItem "C:\Program Files (x86)\Inno Setup 6" -Force -ErrorAction SilentlyContinue |
              ForEach-Object { Write-Host $_.FullName }

            Write-Host "Inspecting C:\Program Files\Inno Setup 6:"
            Get-ChildItem "C:\Program Files\Inno Setup 6" -Force -ErrorAction SilentlyContinue |
              ForEach-Object { Write-Host $_.FullName }
            exit 1
          }

          Write-Host "ISCC path: $iscc"
          "ISCC=$iscc" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $iscc = $env:ISCC
          if (-not $iscc -or -not (Test-Path $iscc)) {
            throw "ISCC environment variable is missing or invalid: $iscc"
          }

          Write-Host "Building installer with Inno Setup..."
          & $iscc `
            "/DAppVersion=$env:APP_VERSION" `
            "/DOutputFile=NFSScanner-Setup-$env:RELEASE_VERSION" `
            "installer/nfs_scanner.iss"

          $installerPath = Join-Path "artifacts" $env:SETUP_EXE
          if (-not (Test-Path $installerPath)) {
            Write-Host "Installer was not found: $installerPath"
            Write-Host "artifacts directory tree:"
            Get-ChildItem -Path "artifacts" -Recurse -ErrorAction SilentlyContinue |
              ForEach-Object { Write-Host $_.FullName }
            exit 1
          }

          Get-Item $installerPath | Format-List FullName,Length,LastWriteTime

      - name: Upload release package artifact
        uses: actions/upload-artifact@v4
        with:
          name: NFSScanner-Release-Packages
          path: artifacts/*
          if-no-files-found: error

      - name: Upload workflow_dispatch test artifact
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: NFSScanner-Release-Test
          path: artifacts/*
          if-no-files-found: error

      - name: Upload GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: NFS Scanner ${{ github.ref_name }}
          body: |
            Portable zip: 绿色免安装版，解压后直接运行 NFSScanner.exe。
            Setup exe: Windows 安装版，支持开始菜单和桌面快捷方式。
          files: |
            artifacts/NFSScanner-Windows-Portable-*.zip
            artifacts/NFSScanner-Setup-*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
